<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP 原生终端跑团</title>
    <style>body{background:#121212;color:#00ff00;font-family:monospace;padding:20px;}.box{border:1px solid #00ff00;background:#1e1e1e;max-width:700px;margin:0 auto;padding:30px;border-radius:8px;}.btn{display:inline-block;padding:12px 24px;background:#333;color:#00ff00;border:1px solid #00ff00;text-decoration:none;margin:10px;}.btn:hover{background:#00ff00;color:#121212;}.btn-primary{background:#00ff00;color:#121212;}.notice{background:#000;border:1px solid #333;padding:15px;text-align:left;font-size:14px;margin-top:20px;}</style>
</head>
<body>
    <div class="box">
        <h1>&gt;&gt;&gt; SCP 跑团终端</h1>
        <p>无 Python 依赖，使用系统底层 SQLite 引擎实现纯本地终端运行。</p>
        <hr>
        <div class="notice">
            <b>使用步骤：</b><br>
            1. 点击 <b>生成数据库</b> 下载空壳 <code>database.db</code><br>
            2. 点击 <b>下载终端包</b> (Windows/Android)<br>
            3. 解压压缩包，将 <code>database.db</code> 放入同一个目录<br>
            4. Windows 双击 <code>game.bat</code> / Android 运行 <code>sh game.sh</code>
        </div>

        <div style="margin-top:20px;">
            <a href="app/web/init_db.html" class="btn btn-primary">⚡ 生成并下载 database.db</a>
        </div>
        <div style="margin-top:10px;">
            <a href="app/windows/game.zip" class="btn">💻 下载 Windows CMD 包</a>
            <a href="app/android/game.zip" class="btn">📱 下载 Android Termux 包</a>
        </div>
        <p style="color:#888;font-size:12px;margin-top:20px;">* 浏览器内存生成即销毁，无本地磁盘权限安全问题。</p>
    </div>
</body>
</html>
