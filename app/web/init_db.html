<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内部数据库生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { max-width: 600px; margin: 0 auto; background: #1e1e1e; border: 1px solid #00ff00; padding: 20px; border-radius: 8px; }
        #log { background: #000; border: 1px solid #333; padding: 10px; min-height: 150px; margin-top: 15px; font-size: 13px; white-space: pre-wrap; line-height: 1.4; }
        .btn { background: #00ff00; color: #121212; border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn:active { background: #33ff33; }
    </style>
</head>
<body>
    <div class="box">
        <h3>▶ 内部数据库初始化工具</h3>
        <p>点击下方按钮，系统将在本地浏览器缓存中创建名为 <code>sthing.db</code> 的 IndexedDB 数据库。</p>
        <p><b>此过程无需下载任何文件，不会触碰主机磁盘。</b></p>
        <button class="btn" id="initBtn">⚡ 创建内部数据库 (IndexedDB)</button>
        <div id="log">[系统] 等待初始化指令...</div>
    </div>

    <script>
        let SQL = null;
        const DB_NAME = 'sthing.db'; // 对应您指定的目录和名称概念
        const STORE_NAME = 'sqlite_binary';

        config = { locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}` };
        initSqlJs(config).then(sql => { SQL = sql; document.getElementById('log').innerText = "[OK] SQLite 引擎加载完毕。\n等待用户操作。"; });

        document.getElementById('initBtn').addEventListener('click', async function() {
            const log = document.getElementById('log');
            if(!SQL) { log.innerText = "[ERR] 引擎尚未加载，请稍等！"; return; }

            log.innerText = "[系统] 开始在内存中构建 SQLite 数据库...\n";
            
            // 1. 创建内存数据库
            const db = new SQL.Database();
            log.innerText += "[系统] 内存数据库已建立...\n";

            // 2. 创建表结构（对应草图中的数据列）
            db.run(`
                CREATE TABLE users (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    username TEXT,
                    time TEXT,
                    t TEXT,
                    userid TEXT,
                    userip TEXT,
                    version TEXT,
                    pass TEXT,
                    hash TEXT,
                    money INTEGER DEFAULT 1000000,
                    level TEXT DEFAULT "杀手",
                    base TEXT DEFAULT "无"
                );
            `);
            log.innerText += "[系统] 表 users 创建完毕...\n";

            // 3. 注入示例初始化账号
            db.run(`
                INSERT INTO users (username, time, t, userid, userip, version, pass, hash) 
                VALUES ('admin', '20280800101', 'T', 'mcjs-cc', '127.0.0.1', '3.0.1', '80800101', 'a2bCAcCdeziqP97AeZppA7319');
            `);
            log.innerText += "[系统] 初始化账号数据 (用户名: admin) 插入完成...\n";

            // 4. 导出二进制数据
            const binaryData = db.export();
            log.innerText += "[系统] 数据库已序列化为二进制数据。\n";

            // 5. 将二进制数据存入 IndexedDB (模拟写入 /game/web/sthing.db)
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const dbIDB = e.target.result;
                if (!dbIDB.objectStoreNames.contains(STORE_NAME)) {
                    dbIDB.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = (e) => {
                const dbIDB = e.target.result;
                const tx = dbIDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(binaryData, 'sqlite_data');
                tx.oncomplete = () => {
                    log.innerText += "\n[✅ 成功] 已将数据库写入浏览器内部 IndexedDB (sthing.db)。\n";
                    log.innerText += "\n[安全提示] 操作全过程不涉及本地文件系统，已规避高权限导致的服务器/客户端崩溃风险！\n您可以关闭此页，前往游戏页面使用了。";
                };
            };
        });
    </script>
</body>
</html>
