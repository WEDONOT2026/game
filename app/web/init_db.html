<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成 database.db 文件 (CMD兼容版)</title>
    <!-- 引入 SQL.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; background: #1e1e1e; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 8px; }
        #log { background: #000; border: 1px solid #333; padding: 10px; min-height: 100px; margin-top: 15px; white-space: pre-wrap; }
        .btn { background: #00ff00; color: #121212; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; border-radius: 4px; }
        .btn:hover { background: #33ff33; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="box">
        <h3>▶ 生成 database.db (修复完整版)</h3>
        <p>此版本增加了 <b>Inventory (背包)</b> 列，并采用纯文本格式存储。<br>
        完全适配您本地的 CMD 和 Bash 终端。</p>
        <button class="btn" id="genBtn">⚡ 点击生成并下载 database.db</button>
        <div id="log">[系统] 引擎加载中，请稍候...</div>
    </div>

    <script>
        let SQL = null;
        const config = { locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}` };

        // 1. 加载 SQL 引擎
        initSqlJs(config).then(sql => {
            SQL = sql;
            document.getElementById('log').innerText = "[系统] 数据库引擎加载完成，可以生成文件。";
        }).catch(err => {
            document.getElementById('log').innerText = "[错误] 引擎加载失败，请检查网络！" + err;
        });

        // 2. 处理点击生成
        document.getElementById('genBtn').addEventListener('click', function(){
            if(!SQL) { 
                alert("引擎尚未加载完毕，请稍等几秒再试！"); 
                return; 
            }

            const log = document.getElementById('log');
            log.innerText = "[系统] 开始在内存中构建 SQLite 数据库...\n";

            try {
                // 创建数据库
                const db = new SQL.Database();
                
                // 3. 创建表结构（注意：inventory 设为 TEXT，直接存文本）
                db.run(`
                    CREATE TABLE users (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        username TEXT,
                        time TEXT,
                        t TEXT,
                        userid TEXT,
                        userip TEXT,
                        version TEXT,
                        pass TEXT,
                        hash TEXT,
                        money INTEGER DEFAULT 1000000,
                        level TEXT DEFAULT "杀手",
                        base TEXT DEFAULT "无",
                        inventory TEXT DEFAULT "无" 
                    );
                `);
                log.innerText += "[系统] 表 users 创建成功 (包含 inventory 列)。\n";

                // 4. 插入一个默认管理员账号（方便您直接测试）
                db.run(`
                    INSERT INTO users (username, time, t, userid, userip, version, pass, hash, inventory) 
                    VALUES ('admin', '20280800101', 'T', 'mcjs-cc', '127.0.0.1', '3.0.1', '80800101', 'a2bCAcCdeziqP97AeZppA7319', '无');
                `);
                log.innerText += "[系统] 默认账号 (admin) 已注入数据库。\n";

                // 5. 导出并触发下载
                const binaryData = db.export();
                const blob = new Blob([binaryData], { type: 'application/x-sqlite3' });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'database.db'; // 文件名固定
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                log.innerText += "\n[✅ 成功] 文件已触发下载！\n";
                log.innerText += "[提示] 请将下载好的 database.db 放入你的本地终端目录中运行。";

            } catch (e) {
                log.innerText = "[严重错误] 生成过程中发生异常：" + e.message;
            }
        });
    </script>
</body>
</html>
