<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生成 database.db 文件</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>body{background:#121212;color:#00ff00;font-family:monospace;padding:20px;}.box{border:1px solid #00ff00;background:#1e1e1e;max-width:600px;margin:0 auto;padding:20px;border-radius:8px;}#log{background:#000;border:1px solid #333;padding:10px;min-height:100px;}.btn{background:#00ff00;color:#121212;border:none;padding:15px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px;}</style>
</head>
<body>
    <div class="box">
        <h3>生成 database.db</h3>
        <p>此操作完全在您的浏览器内存中进行。<br>生成后点击下载，页面关闭或刷新后，内存数据库<b>立即销毁</b>，绝对安全。</p>
        <button class="btn" id="genBtn">▶ 生成并下载 database.db</button>
        <div id="log">[系统] 引擎未加载...</div>
    </div>
    <script>
        let SQL = null;
        config = { locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}` };
        initSqlJs(config).then(sql => { SQL = sql; document.getElementById('log').innerText = "[系统] 引擎加载完成，点击按钮生成。"; });
        document.getElementById('genBtn').addEventListener('click', function(){
            if(!SQL) { alert("引擎加载中，稍后重试。"); return; }
            const db = new SQL.Database();
            db.run(`CREATE TABLE users (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                username TEXT, time TEXT, t TEXT, userid TEXT,
                userip TEXT, version TEXT, pass TEXT, hash TEXT,
                money INTEGER DEFAULT 1000000, level TEXT DEFAULT "杀手", base TEXT DEFAULT "无"
            );`);
            // 2. 创建表结构（包含您缺失的 inventory 字段）
            db.run(`
                CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT,username TEXT,time TEXT,t TEXT,userid TEXT,userip TEXT,version TEXT,pass TEXT,hash TEXT,money INTEGER DEFAULT 1000000,level TEXT DEFAULT "杀手",base TEXT DEFAULT "无",inventory TEXT DEFAULT "{}" );
            `);
            
            const blob = new Blob([db.export()], { type: 'application/x-sqlite3' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'database.db';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            document.getElementById('log').innerText = "[系统] 下载已触发！关闭本页面，内存中的文件将自动释放。";
        });
    </script>
</body>
</html>
