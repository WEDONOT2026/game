<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP 跑团 (云同步版)</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .terminal { background: #1e1e1e; border: 2px solid #00ff00; border-radius: 8px; max-width: 700px; margin: 0 auto; padding: 20px; }
        #terminal-output { background: #000; border: 1px solid #333; height: 250px; overflow-y: auto; padding: 10px; margin-bottom: 15px; font-size: 15px; line-height: 1.5; }
        .cmd-row { display: flex; gap: 5px; }
        #cmd-input { flex: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; font-family: monospace; outline: none; }
        #cmd-btn { background: #00ff00; color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        #cmd-btn:active { background: #33ff33; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h3 style="border-bottom:1px solid #00ff00; padding-bottom:10px;">&gt;&gt;&gt; SCP 同步终端</h3>
        <div id="terminal-output"></div>
        <div class="cmd-row">
            <input type="text" id="cmd-input" placeholder="输入指令 (attack / status / sync)">
            <button id="cmd-btn">执行</button>
        </div>
        <div class="footer">本地缓存 + 欧洲云端双重备份 (玩家数据永不丢失)</div>
    </div>
    <script src="game_sync.js"></script>
</body>
</html>
